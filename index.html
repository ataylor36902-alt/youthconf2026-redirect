<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youth Conference 2026 - Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4338ca 60%, #6366f1 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 420px;
      width: 100%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 8px;
      font-style: italic;
    }
    .date {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 32px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 24px;
    }
    .manual-link {
      display: inline-block;
      color: white;
      font-size: 14px;
      opacity: 0.6;
      text-decoration: underline;
      margin-top: 12px;
    }
    .manual-link:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">✝️</div>
    <h1>Youth Conference 2026</h1>
    <p class="subtitle">"A Generation Chosen to Lead"</p>
    <p class="date">June 26-28, 2026 &bull; Halifax Community College, Weldon, NC</p>
    <div class="spinner"></div>
    <p class="status" id="status">Loading conference site...</p>
    <a class="manual-link" id="manual-link" href="https://youth-conference-mailer--ataylor36902.replit.app/">
      Tap here if not redirected automatically
    </a>
  </div>
  <script>
    var TARGET = 'https://youth-conference-mailer--ataylor36902.replit.app/';
    var HEALTH = 'https://youth-conference-mailer--ataylor36902.replit.app/api/health';
    var statusEl = document.getElementById('status');
    var attempt = 0;
    function tryRedirect() {
      attempt++;
      if (attempt > 1) {
        statusEl.textContent = 'Waking up server... (attempt ' + attempt + ')';
      }
      fetch(HEALTH, { cache: 'no-store' })
        .then(function(resp) {
          if (resp.ok) {
            return resp.json();
          }
          throw new Error('not ready');
        })
        .then(function(data) {
          if (data && data.status === 'ok') {
            statusEl.textContent = 'Redirecting...';
            window.location.href = TARGET;
          } else {
            throw new Error('not ready');
          }
        })
        .catch(function() {
          setTimeout(tryRedirect, 3000);
        });
    }
    tryRedirect();
  </script>
</body>
</html>
